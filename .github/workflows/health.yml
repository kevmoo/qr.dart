name: Health
on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  health:
    uses: dart-lang/ecosystem/.github/workflows/health.yaml@main
    with:
      sdk: stable
      checks: "changelog,coverage,breaking,do-not-submit,leaking,unused-dependencies"
    permissions:
      pull-requests: write
